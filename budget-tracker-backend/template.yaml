AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Budget Tracker backend using AWS SAM

Globals:
  Function:
    Timeout: 5
    Runtime: nodejs18.x
    MemorySize: 128

Resources:
  BudgetFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.handler
      CodeUri: budget-handler/
      Events:
        BudgetApi:
          Type: Api
          Properties:
            Path: /budget
            Method: ANY
      Environment:
        Variables:
          BUDGET_TABLE: BudgetTable # DynamoDB table name
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Scan
              Resource: !GetAtt BudgetTable.Arn

  BudgetTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BudgetTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
