AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Budget Tracker Backend with DynamoDB and CORS

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Timeout: 10

Resources:
  BudgetApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'OPTIONS,GET,POST'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  BudgetFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      Runtime: nodejs18.x
      CodeUri: .
      Events:
        Budget:
          Type: Api
          Properties:
            Path: /budget
            Method: ANY
            RestApiId: !Ref BudgetApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: BudgetTable
      Environment:
        Variables:
          TABLE_NAME: BudgetTable

  BudgetTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BudgetTable
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - app.js
        External:
          - aws-sdk

